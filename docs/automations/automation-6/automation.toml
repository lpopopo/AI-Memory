prompt = "对 AQR Research、Citadel Securities Market Insights、GMO Research Library、Man Institute Market Views 进行周度深度学习，并将可复用结论同步到 D:\\code\\AI-Memory 的 quant-strategy 记忆库。\n\n目标：持续吸收四家机构的公开研究和市场观点，提炼对当前 US stock quant-strategy 有用的策略原则、风险框架、候选假设、回测方向和日度监控改进。不要生成未经验证的交易建议。\n\n必须先读取：D:\\code\\AI-Memory\\domains\\quant-strategy\\memory\\summary.md、decisions.md、hypotheses.md、daily-summaries.md，以及 references/institutional-market-research-framework.md、institutional-overlays-daily-checklist.md、institutional-overlay-scorecard.md、institutional-overlays-backtest-plan.md、ai-quality-capex-cycle-classification.md、daily-market-monitoring-framework.md，以及 D:\\code\\AI-Memory\\domains\\quant-strategy\\tools\\README.md。\n\n必须优先执行本地机构研究检查器：\n1. 从 automation memory、realtime-public-source-tracker.md、最近 institutional monitor / weekly study 文件确定 since 时间；若是周度深度学习，默认使用上次周度学习后的时间，缺失时使用最近 7 天。\n2. 运行：node D:\\code\\AI-Memory\\domains\\quant-strategy\\tools\\institutional-research-checker.js --since <ISO时间> --max-items 8 --out D:\\code\\AI-Memory\\domains\\quant-strategy\\work\\institutional-research-latest.md\n3. 必须读取生成的 institutional-research-latest.md 和 institutional-research-latest.json，再写 AQR/Citadel/GMO/Man 的核验结论。\n4. 不得只因为官网直接打开返回 403/security verification、浏览器超时或列表页动态加载不完整，就把来源写为不可用。必须以 checker 诊断区分：列表页可读、详情页可读、详情页被挡、仅列表候选、日期不可验证。\n5. Citadel Securities 若官网直连 403，但 checker/Jina Reader 能读取官方域名列表或详情页，应标为“Reader 官方域名通道可读”，不能写成官网整体不可用。\n6. 只有 official-domain detail page 有稳定标题、日期和正文时，才可提炼研究框架。只有列表可见但详情页被 403/安全校验挡住时，只记录候选和访问限制，不提炼新框架。\n7. AQR、GMO 页面若可读但没有 since 后新增，应写明“列表/详情已核验，窗口后无新增”，不要写成未核验。\n\n研究来源：\n1. AQR: https://www.aqr.com/Insights/Research\n2. Citadel Securities: https://www.citadelsecurities.com/news-and-insights/category/market-insights/\n3. GMO: https://www.gmo.com/americas/research-library/\n4. Man Institute: https://www.man.com/maninstitute/market-views\n\n工作要求：\n1. 打开并核验四个来源的最新公开内容；记录文章标题、日期、链接、主题、主要观点和证据质量。\n2. 按来源分别总结：AQR 偏趋势/因子/组合构建；Citadel Securities 偏市场结构/流动性/仓位/资金流；GMO 偏质量、估值、AI 周期与长期回报；Man Group 偏宏观、因子隐含暴露、回撤和 AI/市场结构专题。\n3. 将结论映射到 quant-strategy：market fear gate、trend_aligned_entry、flow_fragility、AI_quality/capex_cycle、factor_macro_exposure、bottleneck_watch、portfolio concentration、replay/backtest plan。\n4. 明确区分：可立即纳入日度监控的观察项、需要加入 hypotheses.md 的未验证假设、需要加入 references 的稳定框架、需要进入 experiments/backtest 的验证任务。\n5. 若发现高价值新框架，更新或新增 references；若只是阶段性观察，写入 memory/daily/YYYY-MM-DD-institutional-research-weekly.md；若产生可验证假设，追加到 hypotheses.md；只有经过历史 replay 或反复验证的规则才能更新 decisions.md。\n6. 每次输出中文周报，包含：本周新增研究索引、四家机构分别学到什么、对当前 AI 基建/应用/存储/光互连/市场风险的启发、对自动化和回测的改进建议、记忆库更新清单、下一步待验证事项。\n7. 不要写入券商隐私、账户凭证或真实交易信息；不要把机构观点直接当作买卖建议。"
