name = "盘中执行清单、持仓记账与策略复盘"
prompt = "执行 quant-strategy 的美股盘中执行准备、持仓记账、初步复盘与 AI-Memory 分层记忆维护。此任务运行在北京时间 23:15，通常仍处于美股盘中；不得把盘中价格当作正式收盘触发。正式收盘止损、组合净值确认、市场门控审计和稳定规则更新，以 04:15 盘后正式审计任务为准。\n\n必须先读取 D:\\code\\AI-Memory\\domains\\quant-strategy 下的 memory/summary.md、memory/decisions.md、memory/daily-summaries.md、最近 daily 记录、memory/todos 最新记录、当天每日美股策略建议、当天 20:30 实时资讯与机构研究监控产物、memory/portfolio 最新组合快照、memory/trades 近期记录，以及 references/us-stock-daily-strategy-report-template.md、references/daily-market-monitoring-framework.md、references/market-fear-technical-framework.md、references/portfolio-concentration-rules.md、references/institutional-overlays-daily-checklist.md、references/institutional-overlay-scorecard.md、references/ai-quality-capex-cycle-classification.md、references/institutional-overlay-replay-protocol.md、tools/README.md 的 Quote Workflow Smoke Test。\n\n行情获取规则：\n1. 需要本地行情时，必须优先使用修复后的 quote workflow：按 tools/README.md 的 Node smoke test 路径运行；Node 客户端内部已有 node:https -> PowerShell WebClient -> fetch 传输兜底。Node AggregateError 不能直接当作 workflow 不可用。\n2. 当前 quote hierarchy 是 Tencent -> Yahoo chart -> Sina，空数组必须视为源失败并继续 fallback。\n3. 若 Node 最终失败，再使用 Codex bundled Python 路径的 Python smoke test；不得调用裸 python.exe 或 Windows Store stub。\n4. 只要 Node 或 Python 任一路径返回结构化 quote objects，必须记录 source、时间和数据质量，不得再写 local quote workflow unavailable。只有所有本地路径均失败，才标为数据缺口并保留源级错误。\n5. 若本地路径都失败，或需要单个 ticker sanity check，可打开 Google Search / Google Finance 股票卡片，例如 https://www.google.com/search?q=RKLB 或 https://www.google.com/finance/quote/RKLB:NASDAQ。只有渲染后的浏览器页面可见价格才可记录，source 标为 Google browser-visible snapshot；不要把 Google 跳转 HTML 当作数据源。\n\n必须完成：\n1. 使用最新可得市场数据核对价格、风险状态、候选挂单价格、持仓价值和数据缺口，明确数据时间、来源和质量。\n2. 将当天策略建议转成清晰执行清单：买入、卖出、减仓、加仓、持有、撤单、仅观察。每项写明股票代码、方向、数量、目标金额、组合占比、参考价格、触发条件、止损/减仓线、失效条件、策略理由、风险点和状态。\n3. 必须区分真实成交、等待用户确认的待执行清单、模型组合模拟成交。不得登录券商、不得提交真实订单、不得虚构成交。\n4. 对现有持仓标注 core hold / defensive hold / reduce-review / exit-review / watch only。AMD 若仍低于已有收盘止损线，必须保持 reduce-review 或记录明确规则覆盖理由；WDC/STX 若接近止损且同主题承压，标为 defensive hold / near-stop review；MRVL 若事件拉升后未确认趋势，禁止追高。\n5. 填写 institutional overlay 摘要：flow_fragility_state、trend_aligned_entry_state、AI_quality/capex_cycle、factor_macro_flags、bottleneck_watch、action impact。新买入必须通过 trend_aligned_entry。\n6. 总结当天截至当前时间的策略分析、实际/模型操作、关键判断和数据缺口。单独复盘上一交易日或上一策略计划，对照后续市场表现、规则执行和风险控制；若正式收盘数据尚不可得，明确标注“盘中初步复盘”。\n7. 检查已有 todos，特别是盘后审计、AMD close-stop trigger、WDC/STX near-stop review、theme-crowding overlay replay、live quote workflow。若发现问题，写清问题、影响、可能原因、修复建议、验证方式和下一步，并记录到 memory/todos/YYYY-MM-DD-strategy-todos.md。\n8. 若 replay 协议适用，更新或提示更新 experiments/2026-06-08-institutional-overlay-replay/replay-ledger-template.csv；不要预填未来日期。\n9. 更新或创建 memory/trades/YYYY-MM-DD-trade-plan.md、memory/portfolio/YYYY-MM-DD-portfolio-summary.md、memory/daily/YYYY-MM-DD-details.md，并向 memory/daily-summaries.md 追加简洁时间线。列出需要用户确认的订单、待复核事项和数据缺口。\n10. 仅在重要状态变化时更新 summary.md；只有经过验证的稳定结论才能更新 decisions.md。每逢周日额外更新 weekly summary；每月最后一天额外更新 monthly summary。\n\n输出中文，末尾列出需要用户确认的重点问题与待办。不要写入券商隐私、账户凭证或敏感信息。不得登录券商、不得提交真实订单、不得虚构真实成交；真实账户必须以用户或券商回报为准。"
