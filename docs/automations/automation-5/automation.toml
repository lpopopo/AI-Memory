prompt = "执行 quant-strategy 的美股盘后正式审计。此任务在美股常规交易收盘后运行，负责正式收盘触发、组合风险审计、模型组合净值核对和记忆更新。\n\n必须先读取 D:\\code\\AI-Memory\\domains\\quant-strategy 下的 summary.md、decisions.md、daily-summaries.md、最近 daily 记录、当天策略建议、执行清单、盘中复盘、memory/portfolio 最新组合快照、memory/trades 近期记录，以及 references/market-fear-technical-framework.md、portfolio-concentration-rules.md、daily-market-monitoring-framework.md、institutional-overlays-daily-checklist.md、institutional-overlay-scorecard.md、ai-quality-capex-cycle-classification.md、institutional-overlay-replay-protocol.md、domains/quant-strategy/tools/README.md 的 Quote Workflow Smoke Test。\n\n必须完成：\n1. 获取并记录正式收盘价或可靠收盘数据：MRVL、AMD、WDC、STX、SPY、QQQ、SMH/SOXX、VIX；尽量补充 VIX/VIX3M、RSP/SPY、HYG/LQD、IWM/SPY。标明数据来源、时间和数据质量。\n2. 行情获取必须先使用修复后的本地 quote workflow：按 tools/README.md 的 Node smoke test 获取 MRVL、AMD、SPY、QQQ、SMH 等；Node 客户端内部已有 node:https -> PowerShell WebClient -> fetch 传输兜底，Node AggregateError 不能直接当作 workflow 不可用。必要时使用 Codex bundled Python 跑 Python smoke test。不得调用裸 python.exe。当前层级是 Tencent -> Yahoo chart -> Sina，空数组必须视为源失败并继续 fallback。若任一路返回结构化 quote objects，必须使用 source/quality 标注，不得写“local quote workflow unavailable”。若所有本地路径失败，再使用 StockAnalysis/官方收盘表等公开快照，并明确数据质量。\n3. 若本地 Node/Python 路径都失败，或需要单个 ticker sanity check，可打开 Google Search / Google Finance 股票卡片（如 `https://www.google.com/search?q=RKLB` 或 `https://www.google.com/finance/quote/RKLB:NASDAQ`），仅在渲染页面可见价格时记录为 `Google browser-visible snapshot`；不要把 Google 跳转 HTML 当作数据。\n4. 正式计算或判定市场恐慌门控：normal/elevated/stress/panic、风险乘数、现金底线、新买入上限。\n5. 生成 stop-trigger table：对每个活跃持仓记录收盘价、既有止损/减仓线、是否触发、是否 near-stop、下一步状态。若 AMD 收盘仍低于既有 492 风险线，必须标为 reduce-review 或记录明确规则覆盖理由。WDC/STX 若接近或跌破风险线，标为 defensive hold / near-stop review 或 reduce-review。MRVL 按已有利润保护和风险线复核，禁止因事件反弹自动追高。\n6. 填写 institutional overlay scorecard：flow_fragility_score/state、trend_aligned_entry_score/state、AI_quality/capex_cycle、factor_macro_flags、bottleneck_watch、action impact。\n7. 若 flow_fragility elevated/acute、theme_overlap_high 或 sleeve_correlation_high，必须执行组合级相关风险复核，而不是只看单股。\n8. 核对模型组合净值、现金比例、股票敞口、持仓数量、主题数量、最大单股权重；更新或创建 memory/portfolio/YYYY-MM-DD-portfolio-summary.md。\n9. 如 replay 协议适用，向 experiments/2026-06-08-institutional-overlay-replay/replay-ledger-template.csv 追加已完成收盘行；不得预填未来日期。\n10. 更新或创建 memory/daily/YYYY-MM-DD-post-close-audit.md，并向 daily-summaries.md 追加一条简洁总结；如产生待办，更新 memory/todos/YYYY-MM-DD-strategy-todos.md。\n11. 只在经过验证的稳定规则出现时更新 decisions.md；单日 replay 或单日警报不得直接升级为稳定决策。\n\n输出中文。不得登录券商、不得提交真实订单、不得虚构真实成交；真实账户必须以用户或券商回报为准。"
