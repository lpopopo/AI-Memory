prompt = "在美股开盘时执行 quant-strategy 的实时资讯核验、机构研究增量检查、AI-Memory 候选股池读取、开盘个股行情核对、多维策略分析与具体操作建议生成。任务目标是基于 D:\\code\\AI-Memory 的 quant-strategy 记忆、已有选股池、既有策略规则、当天新增公开资讯、机构研究增量、市场开盘状态、个股最新行情和日 K 线结构，输出中文“开盘个股操作准备清单”。\n\n此任务只能生成待用户确认的操作建议和执行准备，不得登录券商、不得提交真实订单、不得虚构成交。是否下单、挂单、撤单、成交或调整，必须等待用户后续同步或确认。\n\n必须先读取：D:\\code\\AI-Memory\\README.md、D:\\code\\AI-Memory\\docs\\memory-architecture.md、domains\\quant-strategy\\memory\\summary.md、memory\\decisions.md、memory\\hypotheses.md、memory\\daily-summaries.md、最近 daily 记录、memory\\todos 最新记录、memory\\portfolio 最新组合快照、memory\\trades 近期记录、references\\market-fear-technical-framework.md、references\\portfolio-concentration-rules.md、references\\daily-market-monitoring-framework.md、references\\institutional-overlays-daily-checklist.md、references\\institutional-overlay-scorecard.md、references\\ai-quality-capex-cycle-classification.md、references\\realtime-public-source-tracker.md、references\\institutional-overlay-replay-protocol.md、references\\us-stock-strategy-blueprint.md、tools\\README.md 的 Quote Workflow Smoke Test，以及可用的日 K 线/历史行情获取说明。\n\n候选股票池与策略来源要求：\n1. 选股必须优先从 AI-Memory 中已有候选池、关注标的、历史策略建议、持仓/交易记录、watchlist、hypotheses、daily 复盘和 references 里的策略框架中提取，不得临时凭空发散一大批新 ticker。\n2. 若 AI-Memory 中已有明确关注标的或主题池，先围绕这些标的做筛选、排序和操作判断；新加入候选股必须说明来自哪条新增资讯、机构研究、主题映射或策略假设。\n3. 稳定策略规则以 memory\\decisions.md 为最高优先级；references 中的框架作为执行规则；daily 记录和 hypotheses 只能作为背景或待验证假设，不能自动当作当前买卖建议。\n4. 必须把候选股映射到已有策略维度，例如 market fear gate、trend_aligned_entry、flow_fragility、AI_quality/capex_cycle、factor_macro_exposure、bottleneck_watch、portfolio concentration、replay/backtest plan。\n5. 若候选股不在 AI-Memory 的既有关注范围内，必须降低优先级，标注“新增候选/待验证”，并给出进入观察池的理由，不得直接列为高置信操作。\n\n实时资讯与公开来源检查（2026-06-19 更新：优先浏览器登录态，不再把小红书/Kay 依赖脚本抓取）：\n1. 先读取 D:\\code\\AI-Memory\\domains\\quant-strategy\\tools\\README.md、references\\realtime-public-source-tracker.md、最近 source monitor / daily learning 记录，并从 automation memory 或 tracker 确定 last successful run / since 时间。\n2. 小红书账号 `美研芒格君` / `Kay2289123` 必须优先使用已登录 Chrome 的浏览器可见页面读取：打开主页，定位最新笔记/置顶与非置顶更新，进入单篇笔记，优先读取正文、发布时间/编辑时间、评论区作者补充、以及轮播图。\n3. 对小红书轮播图，不能只读标题或正文摘要；若页面显示多图（例如 `1/16`），必须尽量提取或逐张打开全部轮播图，做图片级阅读/OCR/视觉核验，并记录已读图片数量、笔记 ID、标题、页面可见时间、证据等级和未读缺口。只有标题无正文/图片时，只能标为低到中证据候选。\n4. X 账号 `@Kay2289123` 必须优先使用已登录 Chrome 的浏览器可见页面读取：打开主页、Posts、Articles、Media（如有必要），系统提取近期可见帖子和长文入口，记录 status ID、发布时间、链接、主题、可见正文摘要、证据等级和待验证事项。\n5. 对 `@nvidia`、`@elonmusk`、`@realDonaldTrump` 等 X 来源，也优先用浏览器可见页面或可打开的 status 页面核验；若浏览器不可用或页面不可见，标记为 browser-visible source gap，不要把跳转 HTML、登录墙或空页面当作数据源。\n6. 对小红书 `美研芒格君` 和 X `@Kay2289123`，不再把 `realtime-public-source-checker.js` 作为优先或必跑路径；只有在浏览器不可用且需要补充低证据标题候选时，才可作为降级诊断使用，并必须明确标注为低证据。不要用脚本抓取结果覆盖浏览器可见内容。\n7. 浏览器读取只能做只读信息收集：不得读取 cookies、密码、本地存储、私信、通知隐私、账号设置；不得关注、点赞、评论、转发、发帖或传输用户隐私。\n8. 若浏览器读取产出 verified source item，必须记录：平台、账号、帖子/笔记 ID、发布时间或页面可见时间、链接、类型（X post / X article / Xiaohongshu note / carousel image set）、事实摘要、作者观点、我的推断、证据强度、待验证事项和策略映射。\n9. 公开来源内容只用于候选池、主题温度、AI bottleneck watch、AI_quality/capex_cycle、flow_fragility、theme crowding 和 replay/backtest plan，不得单独生成交易建议。\n\n机构研究增量检查：\n1. 运行：node D:\\code\\AI-Memory\\domains\\quant-strategy\\tools\\institutional-research-checker.js --since <ISO时间> --max-items 8 --out D:\\code\\AI-Memory\\domains\\quant-strategy\\work\\institutional-research-latest.md\n2. 必须读取 institutional-research-latest.md 和 institutional-research-latest.json，再写 AQR/Citadel/GMO/Man 的核验结论。\n3. 不得只因官网返回 403/security verification、浏览器超时或动态加载不完整，就把机构来源写为不可用。必须以 checker 诊断区分：列表页可读、详情页可读、详情页被挡、仅列表候选、日期不可验证。\n4. 机构研究内容只提炼可复用框架，不直接生成交易建议；重点归类为 trend-aligned entry、flow_fragility、AI_quality/capex_cycle、factor_macro_exposure、AI bottleneck watch。\n\n开盘行情、日 K 线与个股状态检查：\n1. 需要本地行情时，必须优先使用 quant-stock-data 的修复后工作流，按 tools/README.md 的 Quote Workflow Smoke Test 跑 Node 路径，必要时再跑 Codex bundled Python 路径。\n2. Node 路径为 stock_service.js，当前层级是 Tencent -> Yahoo chart -> Sina；每个源请求内部还有 node:https -> PowerShell WebClient -> fetch 传输兜底。空数组必须视为源失败并继续 fallback，Node AggregateError 不能直接判定 quote workflow 不可用。\n3. Python 路径必须使用 Codex bundled Python：C:\\Users\\lp\\.cache\\codex-runtimes\\codex-primary-runtime\\dependencies\\python\\python.exe；不得调用裸 python.exe 或 Windows Store stub。\n4. 若 Node 或 Python 任一路径返回结构化 quote objects 或历史日 K 数据，必须记录 source、时间、复权/未复权口径和数据质量，不得再写 local quote workflow unavailable。只有所有路径均失败，才标为数据缺口并保留源级错误。\n5. 对候选 ticker，必须尽量获取最近 60 到 120 个交易日的日 K 线数据，至少提取近 20 日、50 日和 120 日的关键结构：前收、近 5/10/20 日高低点、20 日均线、50 日均线、120 日均线、近期放量/缩量、跳空缺口、波动区间、ATR 或近似日均波幅。\n6. 挂单价格必须参考日 K 线结构，而不是只按实时价随意给出。买入候选优先参考回踩支撑位、突破回踩位、20/50 日均线附近、前高突破确认位、缺口回补区和近 5/10/20 日低点上方的风险收益比；卖出/减仓候选参考压力位、前高失败、跌破关键均线、跌破前低、止损线或反弹到压力区。\n7. 若日 K 线数据不可得，必须明确写“日 K 数据缺口”，只能给观察区间或更保守的 watch only，不得给高置信挂单价。\n8. 对单个美股 ticker 或挂单价 sanity check，可打开 Google Search / Google Finance 股票卡片，例如 https://www.google.com/search?q=RKLB 或 https://www.google.com/finance/quote/RKLB:NASDAQ。只有渲染后的浏览器页面可见价格才可记录，source 标为 Google browser-visible snapshot；不要把 Google 跳转 HTML 当作数据源。\n\n多维策略分析要求：\n1. 每个候选个股必须按多个维度分析，而不是只看新闻或价格。至少覆盖：AI-Memory 选股来源、已有策略匹配度、市场门控、趋势位置、日 K 技术结构、资讯催化、机构/行业框架、AI_quality/capex_cycle、flow_fragility、主题拥挤度、估值/质量粗筛、组合集中度、现金约束、已有持仓状态、止损/减仓纪律、风险收益比和数据质量。\n2. 给出简洁的维度评分或判断，例如 bullish / neutral / bearish、pass / caution / fail，或 0-2 分。必须说明哪些维度支持操作，哪些维度构成否决或降级。\n3. 新增买入必须同时满足：来自 AI-Memory 既有候选池或有清晰新增来源、市场门控允许、趋势或回踩结构可解释、日 K 线能给出清晰失效位、风险收益比合理、组合集中度不过载、没有高优先级止损/减仓冲突。\n4. 若资讯很强但日 K 线位置追高、主题拥挤或 flow_fragility elevated，必须降级为 watch only / no chase，并给出等待回踩或突破确认的价格条件。\n5. 若技术结构良好但资讯或机构证据不足，可列为候选观察，不得夸大确定性。\n6. 若已有持仓处于 reduce-review、defensive hold、near-stop review 或 repair review，优先处理风险控制，不得因为短线资讯直接转成加仓建议。\n\n输出必须聚焦开盘个股操作建议：\n1. 今日是否允许新操作：用一句话说明市场门控状态、现金目标、风险乘数、主题拥挤度和是否允许新增挂单；若不允许，仍可列观察价但标为 watch only。\n2. 候选个股操作表：每行必须包含 ticker、AI-Memory 来源、适用策略、方向 buy/sell/reduce/add/hold/cancel/watch only、多维结论、参考挂单价或区间、日 K 线依据、建议股数、目标金额、订单类型建议、触发条件、失效条件、止损/减仓风险线、数据来源、资讯/机构证据、备注。\n3. 对每个给出价格的操作，必须写明价格依据：例如近 20 日支撑、50 日均线附近、前高突破确认、缺口回补区、ATR 回撤、前低失效位、压力位减仓区。不能只写一个数字而不解释来源。\n4. 股数必须按当前账户/模型约束保守估算；无法确认真实账户现金或持仓时，必须写“需用户同步账户后确认”，不得假设真实可用现金或真实持仓。\n5. MRVL、AMD、WDC、STX 等历史关注标的必须严格区分真实账户和历史模型/回放；未获用户确认的真实持仓不得写成当前持仓。\n6. 若标的处于 no chase、reduce-review、defensive hold、repair review 或 watch only，只能给观察价、撤单/减仓复核条件或风险线，不得写成立即执行。\n7. 不得写“已下单”“应立即买入/卖出”“执行某订单”。只能写“候选操作准备”“等待用户确认/同步后再操作”。\n8. 不要生成大段宏观报告；宏观、机构和新闻只作为操作表中的依据和备注。\n9. 如产生记忆更新，只写入 memory/daily 和 daily-summaries 的简短记录；只有经过验证的稳定规则才能更新 decisions.md。\n\n输出中文，明确区分公开事实、作者观点、推断和未核验证据；不要写入券商隐私、账户凭证或真实交易信息。"
